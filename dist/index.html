<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>My News – Aggregated</title>
<meta name="description" content="A fast, free, static news aggregator."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --card-hover: #f1f5f9;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(99,102,241,0.4);
    --fg: #0f172a;
    --muted: #64748b;
    --muted-light: #475569;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.08);
    --desc: #475569;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(248,250,252,0.9);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .brand-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(135deg, #1e293b, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-meta {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .updated-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(99,102,241,0.07);
    border: 1px solid rgba(99,102,241,0.18);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted-light);
    white-space: nowrap;
  }
  .updated-dot {
    width: 6px; height: 6px;
    background: #10b981;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.4; transform:scale(.8); }
  }
  .sources {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .pill {
    padding: 3px 10px;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 999px;
    color: var(--muted-light);
    font-size: 11px;
    font-weight: 500;
    background: rgba(0,0,0,0.03);
    transition: border-color .2s, color .2s;
    cursor: default;
  }
  .pill:hover { border-color: var(--accent); color: var(--fg); }

/* ── Main grid ───────────────────────────────────── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
  }
  .section-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* ── Cards ───────────────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: background .2s, border-color .25s, transform .2s, box-shadow .25s;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .card:hover {
    background: var(--card-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,.08), 0 0 0 1px var(--border-hover), 0 4px 16px var(--accent-glow);
  }
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .source-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .04em;
    padding: 3px 9px;
    border-radius: 999px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  /* Source colours – adjusted for light background */
  .src-bbc-world        { background:rgba(220,38,38,.08);  color:#dc2626; border:1px solid rgba(220,38,38,.2); }
  .src-reuters-world    { background:rgba(234,88,12,.08);   color:#ea580c; border:1px solid rgba(234,88,12,.2); }
  .src-the-verge        { background:rgba(219,39,119,.08);  color:#db2777; border:1px solid rgba(219,39,119,.2); }
  .src-hacker-news      { background:rgba(234,88,12,.08);   color:#ea580c; border:1px solid rgba(234,88,12,.2); }
  .src-techcrunch       { background:rgba(5,150,105,.08);   color:#059669; border:1px solid rgba(5,150,105,.2); }
  .src-zdnet            { background:rgba(37,99,235,.08);   color:#2563eb; border:1px solid rgba(37,99,235,.2); }
  .src-engadget         { background:rgba(124,58,237,.08);  color:#7c3aed; border:1px solid rgba(124,58,237,.2); }
  .src-custom-feed      { background:rgba(99,102,241,.08);  color:#4f46e5; border:1px solid rgba(99,102,241,.2); }
  .card-time {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .card h3 {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.45;
    letter-spacing: -0.1px;
  }
  .card h3 a {
    color: var(--fg);
    text-decoration: none;
    transition: color .15s;
  }
  .card h3 a:hover { color: var(--accent); }
  .desc {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--desc);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Custom sources section ──────────────────────── */
  #custom-section { margin-top: 48px; }
  #custom-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .custom-loading {
    grid-column: 1/-1;
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 14px;
  }

  /* ── Category tabs ───────────────────────────────── */
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    margin-bottom: 24px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border: 1.5px solid var(--border);
    border-radius: 999px;
    background: transparent;
    color: var(--muted-light);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color .15s, color .15s, background .15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .tab:hover { border-color: var(--accent); color: var(--fg); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab-count {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 999px;
    background: rgba(0,0,0,0.07);
    color: var(--muted);
  }
  .tab.active .tab-count { background: rgba(255,255,255,0.25); color: #fff; }

  /* ── Modal ───────────────────────────────────────── */
  .modal-overlay[hidden] { display: none; }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.4);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 24px 64px rgba(0,0,0,.15);
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h2 { font-size: 18px; font-weight: 700; color: var(--fg); }
  .modal-close {
    width: 32px; height: 32px;
    border: none;
    background: rgba(0,0,0,0.05);
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: background .15s, color .15s;
  }
  .modal-close:hover { background: rgba(0,0,0,0.1); color: var(--fg); }
  .add-form {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .form-field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .form-field label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted-light);
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .form-field input {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    color: var(--fg);
    background: #fff;
    transition: border-color .15s, box-shadow .15s;
    outline: none;
  }
  .form-field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,.12);
  }
  .form-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .btn-primary {
    padding: 8px 18px;
    background: var(--accent);
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-primary:hover { background: #4f46e5; }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
  .btn-secondary {
    padding: 8px 18px;
    background: rgba(0,0,0,0.05);
    color: var(--muted-light);
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-secondary:hover { background: rgba(0,0,0,0.09); }
  .form-error {
    font-size: 13px;
    color: #dc2626;
    background: rgba(220,38,38,.06);
    border: 1px solid rgba(220,38,38,.15);
    border-radius: 8px;
    padding: 8px 12px;
  }
  /* Saved sources list inside modal */
  .modal-section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .sources-list { display: flex; flex-direction: column; gap: 8px; }
  .no-sources { font-size: 13px; color: var(--muted); text-align: center; padding: 12px 0; }
  .src-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .src-item-info { display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
  .src-item-name { font-size: 13px; font-weight: 600; color: var(--fg); }
  .src-item-url  { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .btn-remove {
    flex-shrink: 0;
    padding: 4px 10px;
    background: rgba(220,38,38,.07);
    color: #dc2626;
    border: 1px solid rgba(220,38,38,.15);
    border-radius: 6px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-remove:hover { background: rgba(220,38,38,.14); }

  /* ── Footer ──────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
  footer a { color: var(--muted-light); text-decoration: none; }
  footer a:hover { color: var(--fg); }

  /* ── Responsive ──────────────────────────────────── */
  @media (max-width: 640px) {
    .header-inner { padding: 14px 16px; gap: 10px; }
main { padding: 20px 16px 60px; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .header-meta { width: 100%; }
  }
</style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">📰</div>
        <h1>My News</h1>
      </div>
      <div class="header-meta">
        <span class="updated-badge">
          <span class="updated-dot"></span>
          Updated 2026-03-19 18:08 UTC
        </span>
        <div class="sources">
          <span class="pill src-bbc-world">BBC World</span><span class="pill src-reuters-world">Reuters World</span><span class="pill src-the-verge">The Verge</span><span class="pill src-hacker-news--top-">Hacker News (Top)</span><span class="pill src-techcrunch--top-">Techcrunch (Top)</span><span class="pill src-zdnet--top-">ZDNet (Top)</span><span class="pill src-engadget--top-">Engadget (Top)</span>
        </div>
      </div>
    </div>
  </header>

  <main>
    <nav class="tabs" id="cat-tabs" aria-label="Filter by category">
      <button class="tab active" data-tab="all">All <span class="tab-count"></span></button>
      <button class="tab" data-tab="tech">Tech1 <span class="tab-count"></span></button>
      <button class="tab" data-tab="world">World <span class="tab-count"></span></button>
      <button class="tab" data-tab="business">Business <span class="tab-count"></span></button>
      <button class="tab" data-tab="science">Science &amp; Health <span class="tab-count"></span></button>
      <button class="tab" data-tab="other">Other <span class="tab-count"></span></button>
    </nav>
    <section class="grid" id="main-grid"></section>

  </main>

  <footer>
    Built with <a href="https://pages.github.com" target="_blank" rel="noopener">GitHub Pages</a> &amp; GitHub Actions &nbsp;·&nbsp; No cookies &nbsp;·&nbsp; Links go to original publishers.
  </footer>


<script>
(function () {
  // ── Tab filtering ──────────────────────────────────
  function allCards() { return document.querySelectorAll('.card[data-cat]'); }

  function updateTabCounts() {
    const tabs = document.querySelectorAll('[data-tab]');
    const counts = { all: 0 };
    allCards().forEach(c => {
      counts.all++;
      const cat = c.dataset.cat;
      counts[cat] = (counts[cat] || 0) + 1;
    });
    tabs.forEach(tab => {
      const cat = tab.dataset.tab;
      const n = counts[cat] || 0;
      tab.querySelector('.tab-count').textContent = n;
      tab.hidden = false;
    });
  }

  function initTabs() {
    const tabs = document.querySelectorAll('[data-tab]');
    let active = 'all';
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        active = tab.dataset.tab;
        tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === active));
        allCards().forEach(c => {
          c.style.display = (active === 'all' || c.dataset.cat === active) ? '' : 'none';
        });
      });
    });
    updateTabCounts();
  }

  initTabs();
})();
</script>
</body>
</html>
